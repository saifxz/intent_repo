version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  producer-1:
    build:
      context: .
      dockerfile: Dockerfile.producer
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer-add_product:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    environment:
      - TOPIC=add_product
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    

  consumer-availability:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    environment:
      - TOPIC=availability
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy
  consumer-request_refund:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    environment:
      - TOPIC=request_refund
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  # ... Apply the same depends_on logic to your other consumers